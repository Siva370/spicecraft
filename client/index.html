<!DOCTYPE html>
<html>
<head>
  <title>SpiceCraft Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-4xl text-yellow-500 text-center mb-6">SpiceCraft 🔥</h1>

<div class="grid grid-cols-2 gap-6">

  <div class="bg-gray-900 p-4 rounded">
    <h2>Paneer Butter Masala 🥦</h2>
    <p>₹220</p>
    <button onclick="addItem('Paneer',220)" class="bg-yellow-500 px-2 py-1 mt-2 rounded">Add</button>
  </div>

  <div class="bg-gray-900 p-4 rounded">
    <h2>Chicken Biryani 🍗</h2>
    <p>₹280</p>
    <button onclick="addItem('Chicken Biryani',280)" class="bg-yellow-500 px-2 py-1 mt-2 rounded">Add</button>
  </div>

</div>

<div class="mt-10">
  <h2 class="text-2xl">Cart 🛒</h2>
  <div id="cart"></div>
  <h3 id="total"></h3>
</div>

<script>
let cart = [];

function addItem(name, price) {
  cart.push({name, price});
  renderCart();
}

function renderCart() {
  let cartDiv = document.getElementById("cart");
  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach(item => {
    cartDiv.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
    total += item.price;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}
</script>

</body>
</html>
