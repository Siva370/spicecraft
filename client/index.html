<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpiceCraft 🍽️</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      padding: 20px;
      color: orange;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    button {
      background: orange;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .cart {
      background: #222;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }

    .checkout {
      background: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>SpiceCraft 🔥</h1>

<div class="menu">
  <div class="card">
    <h3>Paneer Butter Masala 🌱</h3>
    <p>₹220</p>
    <button onclick="addToCart('Paneer Butter Masala', 220)">Add</button>
  </div>

  <div class="card">
    <h3>Chicken Biryani 🍗</h3>
    <p>₹280</p>
    <button onclick="addToCart('Chicken Biryani', 280)">Add</button>
  </div>

  <div class="card">
    <h3>Veg Fried Rice 🥗</h3>
    <p>₹150</p>
    <button onclick="addToCart('Veg Fried Rice', 150)">Add</button>
  </div>
</div>

<div class="cart">
  <h2>Cart 🛒</h2>
  <ul id="cart"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button class="checkout">Place Order 🚀</button>
</div>

<script>
  let cartData = JSON.parse(localStorage.getItem("cart")) || [];
  let total = 0;

  const cart = document.getElementById('cart');
  const totalEl = document.getElementById('total');

  function renderCart() {
    cart.innerHTML = '';
    total = 0;

    cartData.forEach(item => {
      const li = document.createElement('li');
      li.textContent = `${item.name} - ₹${item.price}`;
      cart.appendChild(li);
      total += item.price;
    });

    totalEl.textContent = total;
  }

  function addToCart(item, price) {
    cartData.push({ name: item, price: price });
    localStorage.setItem("cart", JSON.stringify(cartData));
    renderCart();
  }

  renderCart();
</script>

</body>
</html>
