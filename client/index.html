<!DOCTYPE html>
<html>
<head>
  <title>SpiceCraft Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-4xl text-yellow-500 text-center mb-6">SpiceCraft 🔥</h1>

<div class="grid grid-cols-2 gap-6">

  <div class="bg-gray-900 p-4 rounded">
    <h2>Paneer Butter Masala 🥦</h2>
    <p>₹220</p>
    <button onclick="addItem('Paneer Butter Masala',220)" 
      class="bg-yellow-500 px-3 py-1 mt-2 rounded">
      Add
    </button>
  </div>

  <div class="bg-gray-900 p-4 rounded">
    <h2>Chicken Biryani 🍗</h2>
    <p>₹280</p>
    <button onclick="addItem('Chicken Biryani',280)" 
      class="bg-yellow-500 px-3 py-1 mt-2 rounded">
      Add
    </button>
  </div>
   <div class="bg-gray-900 p-4 rounded">
  <h3>Veg Fried Rice 🥗</h3>
  <p>₹150</p>
  <button onclick="addItem('Veg Fried Rice', 150)">
    Add
  </button>
</div>

</div>

<div class="mt-10 bg-gray-900 p-4 rounded">
  <h2>Cart 🛒</h2>
  <div id="cart"></div>
  <h3 id="total"></h3>

  <button onclick="placeOrder()" 
    class="bg-green-500 px-4 py-2 mt-4 rounded">
    Place Order 🚀
  </button>
</div>

<script>
let cart = [];

// ADD ITEM
function addItem(name, price) {
  console.log("Item added:", name);
  cart.push({ name, price });
  renderCart();
}

// SHOW CART
function renderCart() {
  let cartDiv = document.getElementById("cart");
  let total = 0;

  cartDiv.innerHTML = "";

  cart.forEach(item => {
    cartDiv.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
    total += item.price;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

// PLACE ORDER
async function placeOrder() {
  if(cart.length === 0){
    alert("Cart is empty ❌");
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price, 0);

  await fetch("http://localhost:3000/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      items: cart,
      total: total
    })
  });

  alert("✅ Order saved!");
  cart = [];
  renderCart();
}
</script>

</body>
</html>
